name: Container Image CI

on:
  schedule:               # Trigger the image build nightly
    - cron: '0 0 * * *'
  push:                   # Trigger the image build on pushing a tag
    tags:
     - '*'
  workflow_dispatch:

env:
  REPOSITORY: "${{ github.event_name == 'schedule' && 'ghcr.io/ultihash/cluster' || 'registry.ultihash.io/ultihash/cluster' }}"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:

    - name: Set Date
      id: set_date
      run: echo "::set-output name=date::$(printf '%(%Y%m%d)T' -1)"

    - uses: actions/checkout@v4
      with:
        token: ${{ secrets.PAT }}
        submodules: recursive

    - uses: docker/login-action@v2
      with:
        registry: ghcr.io
        username: plauth
        password: ${{ secrets.PAT }}

    - name: Build the Docker image
      env:
        IMAGE_TAG: "${{ github.event_name == 'schedule' && steps.set_date.outputs.date || github.ref_name }}"
      run: docker build --file Dockerfile --tag $REPOSITORY:$IMAGE_TAG .

    - uses: docker/login-action@v2
      if: github.event_name != 'schedule'
      with:
        registry: registry.ultihash.io
        username: github
        password: ${{ secrets.HARBOR_USER }}

    - name: Push the Docker image
      env:
        IMAGE_TAG: "${{ github.event_name == 'schedule' && steps.set_date.outputs.date || github.ref_name }}"
      run: docker push $REPOSITORY:$IMAGE_TAG
name: Test Workflow

on:
  pull_request:
    branches:
    - "*"

jobs:

  scan:
    runs-on: lightweight-generic-jobs
    steps:

      - name: Print out Github env
        run: |
          echo "Workflow ID = ${{ github.run_id }}"  # Correct

      - name: Get Current Job ID
        uses: Tiryoh/gha-jobid-action@v1
        id: jobs
        with:
          job_name: "scan"
          github_token: ${{ secrets.PAT }}

      - name: Output Current Job Log URL
        run: | 
          echo ${{ steps.jobs.outputs.html_url }}
          echo ${{ steps.jobs.outputs.job_id }}

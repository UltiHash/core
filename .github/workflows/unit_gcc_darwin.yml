name: Unit Tests (MacOS Monterey, GCC)

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-12

    steps:
      - uses: actions/checkout@v3
        with:
          token: ${{ secrets.PAT }}
          submodules: recursive

      - name: Install dependencies from Homebrew
        run: |
          brew install wget openssl gcc cmake macfuse
          ln -s /usr/local/opt/openssl/include/openssl /usr/local/include

      - name: Cache boost
        id: cache-boost
        uses: actions/cache@v3
        with:
          path: "/tmp/boost_1_82_0"
          key: ${{ runner.os }}-boost_1_82_0

      - name: Compile Boost with gcc
        if: steps.cache-boost.outputs.cache-hit != 'true'
        run: |
          wget -O /tmp/boost_1_82_0.tar.gz https://sourceforge.net/projects/boost/files/boost/1.82.0/boost_1_82_0.tar.gz/download
          cd /tmp/
          tar -xzf boost_1_82_0.tar.gz
          cd /tmp/boost_1_82_0
          ./bootstrap.sh --with-libraries=all --with-toolset=gcc-13
          sed '10,15d' project-config.jam > project-config.jam.custom 
          echo "using gcc : 13.1 : /usr/local/bin/g++-13 ;" >> project-config.jam.custom
          mv project-config.jam.custom project-config.jam
          ./b2 -j $(sysctl -n hw.logicalcpu) --target=shared,static --link=shared

      - name: Download and install FoundationDB
        run: |
          wget -O /tmp/FoundationDB-7.1.31_x86_64.pkg https://github.com/apple/foundationdb/releases/download/7.1.31/FoundationDB-7.1.31_x86_64.pkg
          sudo installer -verbose -pkg /tmp/FoundationDB-7.1.31_x86_64.pkg -target /
      #- name: Install Boost
      #  run: |
      #    cd /tmp/boost_1_82_0
      #    sudo ./b2 install --target=shared,static --link=shared

      - name: Configure CMake
        # Configure CMake in a 'build' subdirectory. `CMAKE_BUILD_TYPE` is only required if you are using a single-configuration generator such as make.
        # See https://cmake.org/cmake/help/latest/variable/CMAKE_BUILD_TYPE.html?highlight=cmake_build_type
        run: |
          export CXXFLAGS="$CXXFLAGS -I/usr/local/include -I/tmp/boost_1_82_0 -I/usr/local/opt/openssl@3/include"
          cmake -B ${{github.workspace}}/build -DBOOST_ROOT=/tmp/boost_1_82_0 -DOPENSSL_ROOT_DIR=$(brew --prefix openssl@3) -DCMAKE_C_COMPILER=gcc-13 -DCMAKE_CXX_COMPILER=g++-13 -DCMAKE_BUILD_TYPE=Release -DBUILD_SERVER_DB=ON -DBUILD_SERVER_AGENCY=ON -DBUILD_CLIENT_SHELL=ON

      - name: Build
        # Build your program with the given configuration
        run: cmake --build ${{github.workspace}}/build --config Debug --parallel $(sysctl -n hw.logicalcpu)

      - name: Test
        working-directory: ${{github.workspace}}/build
        # Execute tests defined by the CMake configuration.
        # See https://cmake.org/cmake/help/latest/manual/ctest.1.html for more detail
        run: ctest -C Debug --output-on-failure

      - name: Upload uhServerDB
        uses: actions/upload-artifact@v3
        with:
          name: uhServerDB
          path: ${{github.workspace}}/build/server-db/uhServerDB

      - name: Upload uhServerAgency
        uses: actions/upload-artifact@v3
        with:
          name: uhServerAgency
          path: ${{github.workspace}}/build/server-agency/uhServerAgency

      - name: Upload uhClient
        uses: actions/upload-artifact@v3
        with:
          name: uhClient
          path: ${{github.workspace}}/build/client-shell/uhClient


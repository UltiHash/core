---
name: UltiHash Energy/Carbon benchmark
author: Max Plauth <max@ultihash.io>
description: This usage_scenario sets up a UH cluster and measures it carbon footprint using the stability test workflow.

services:
  database:
    image: bitnami/postgresql:16.3.0
    environment:
      POSTGRESQL_PASSWORD: uh
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 5s
      timeout: 5s
      retries: 5

  etcd:
    image: bitnami/etcd:3.5.12
    environment:
      ALLOW_NONE_AUTHENTICATION: yes

  database-init:
    image: registry.ultihash.io/stable/database-init:0.6.0
    depends_on:
      - database
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: uh

      DB_USER: postgres
      DB_HOST: database
      DB_PORT: 5432
      PGPASSWORD: uh
    entrypoint: [ "/bin/bash", "-l", "-c", "until pg_isready -U postgres -h database -p 5432; do echo 'Waiting for postgres...'; sleep 2; done && sh apply_db_schema.sh"]

  storage:
    image: registry.ultihash.io/stable/core:0.6.0
    depends_on:
       - etcd
    environment:
      UH_LICENSE: UltiHash-Test:1048576:Bplb7lZQIK+mIXyPZKRNRIjara5EqxrCz8M5FDlPfqDrlMppL43axS7Ccd9TyuL4v03zHsFzPOyW7k+L+uouBw==
      UH_LOG_LEVEL: DEBUG
    entrypoint: [ "/bin/bash", "-l", "-c", "sleep 10 && uh-cluster --registry etcd:2379 storage" ]

  deduplicator:
    image: registry.ultihash.io/stable/core:0.6.0
    depends_on:
      - etcd
      - storage
    environment:
      UH_LICENSE: UltiHash-Test:1048576:Bplb7lZQIK+mIXyPZKRNRIjara5EqxrCz8M5FDlPfqDrlMppL43axS7Ccd9TyuL4v03zHsFzPOyW7k+L+uouBw==
      UH_LOG_LEVEL: DEBUG
    entrypoint: [ "/bin/bash", "-l", "-c", "sleep 10 && uh-cluster --registry etcd:2379 deduplicator" ]

  entrypoint:
    image: registry.ultihash.io/stable/core:0.6.0
    depends_on:
      - etcd
      - storage
      - deduplicator
    environment:
      UH_LICENSE: UltiHash-Test:1048576:Bplb7lZQIK+mIXyPZKRNRIjara5EqxrCz8M5FDlPfqDrlMppL43axS7Ccd9TyuL4v03zHsFzPOyW7k+L+uouBw==
      UH_LOG_LEVEL: DEBUG
      UH_DB_HOSTPORT: database:5432
      UH_DB_USER: postgres
      UH_DB_PASS: uh
    entrypoint: [ "/bin/bash", "-l", "-c", "sleep 15 && uh-cluster --registry etcd:2379 entrypoint" ]
    ports:
      - 8080:8080

  stability:
    image: ghcr.io/ultihash/core-stability-test:latest
    depends_on:
      - storage
      - deduplicator
      - entrypoint
    environment:
      CLUSTER_URL: http://entrypoint:8080
      AWS_ACCESS_KEY_ID: mocked
      AWS_SECRET_ACCESS_KEY: mocked
      AWS_DEFAULT_REGION: eu-central-1h
    volumes:
      - /data/corpora_test/stability-test:/data
    entrypoint: ["sleep", "infinity"]

flow:
  - name: Run stability test
    container: stability
    commands:
      - type: console
        command: ./start-testing.sh
        note: Start stability test workflow
        read-notes-stdout: true
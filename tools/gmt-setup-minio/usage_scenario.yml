---
name: UltiHash Energy/Carbon benchmark
author: Max Plauth <max@ultihash.io>
description: This usage_scenario sets up a UH cluster and measures it carbon footprint using the stability test workflow.

compose-file: !include compose.yml

services:
  minio:
    command: "server /data"
  stability:
    setup-commands:
      - sleep 10

flow:
  - name: Upload data
    container: stability
    commands:
      - type: console
        command: /testing/howto-uh/scripts/boto3/multithread_upload/uh_upload.py -B gmt-test --url http://minio:9000 /data
        note: Upload test data to uh cluster
        ignore-errors: true
        log-stdout: false
        log-stderr: false
  - name: Download data
    container: stability
    commands:
      - type: console
        command: /testing/howto-uh/scripts/boto3/multithread_download/uh_download.py --url http://minio:9000 gmt-test
        note: Download test data from uh cluster
        ignore-errors: true
        log-stdout: false
        log-stderr: false

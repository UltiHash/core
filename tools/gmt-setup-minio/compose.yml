services:
  minio:
    image: minio/minio:latest
    environment:
      MINIO_COMPRESSION_ENABLE: on
    command: "server /data"
    ports:
      - 9000:9000

  stability:
    image: ghcr.io/ultihash/core-stability-test:gmt
    depends_on:
      - minio
    environment:
      CLUSTER_URL: http://minio:9000
      AWS_ACCESS_KEY_ID: minioadmin
      AWS_SECRET_ACCESS_KEY: minioadmin
      AWS_DEFAULT_REGION: eu-central-1h
    volumes:
      - /data/corpora_test/stability-test-mini:/data
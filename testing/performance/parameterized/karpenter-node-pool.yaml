apiVersion: karpenter.sh/v1beta1
kind: NodePool
metadata:
  name: parameterized-test
spec:
  template:
    metadata:
      labels:
        purpose: parameterized-test
    spec:
      requirements:
        - key: karpenter.sh/capacity-type
          operator: In
          values: ["on-demand"]
        - key: node.kubernetes.io/instance-type
          operator: In
          values: ["$EC2_INSTANCE_TYPE"]
      nodeClassRef:
        apiVersion: karpenter.k8s.aws/v1beta1
        kind: EC2NodeClass
        name: testing
      taints:
        - key: purpose
          value: testing
          effect: NoSchedule
  disruption:
    consolidationPolicy: WhenEmpty
    consolidateAfter: 1m
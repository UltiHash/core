extensions:
  health_check:
  pprof:
    endpoint: 0.0.0.0:1777
  zpages:
    endpoint: 0.0.0.0:55679

receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 'otel:4317'
      http:
  hostmetrics:
    collection_interval: 10s
    scrapers:
      cpu:
      disk:
      load:
      filesystem:
      memory:
      network:
      paging:
  httpcheck:
    targets:
      - endpoint: 'http://localhost:13133/health/status'
        method: GET
      - endpoint: 'http://localhost:13134/health/status'
        method: GET
    collection_interval: 15s
  postgresql:
    endpoint: database:5432
    transport: tcp
    username: postgres
    password: uh
    databases:
      - postgres
    tls:
      insecure: true
  prometheus/otelcol:
    config:
      scrape_configs:
        - job_name: 'otelcol'
          scrape_interval: 10s
          static_configs:
            - targets: [ '0.0.0.0:8888' ]

processors:
  resourcedetection:
    detectors: ['system']
  batch:
    send_batch_size: 10000
    timeout: 10s

exporters:
  debug: {}
  otlp/uptrace:
    endpoint: http://uptrace:14317
    tls: { insecure: true }
    headers: { 'uptrace-dsn': 'http://uh_secret_token@localhost:14318?grpc=14317' }

service:
  extensions: [health_check, pprof, zpages]
  telemetry:
    metrics:
      address: ':8888'
  pipelines:
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp/uptrace]
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp/uptrace]
    metrics/hostmetrics:
      receivers: [hostmetrics, postgresql, httpcheck]
      processors: [batch, resourcedetection]
      exporters: [otlp/uptrace]
    logs:
      receivers: [otlp]
      processors: [batch]
      exporters: [otlp/uptrace]

